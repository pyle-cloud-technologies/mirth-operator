replicaCount: 1

image:
  repository: ghcr.io/pyle-cloud-technologies/mirth-operator
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

leaderElection:
  enabled: true

metrics:
  enabled: true
  port: 8443
  # secure enables HTTPS + authn/authz on the metrics endpoint via K8s TokenReview.
  # When true, Prometheus needs a ServiceAccount with the metrics-reader ClusterRole.
  # Set to false for plain HTTP (e.g. behind a trusted network or service mesh).
  secure: true
  serviceMonitor:
    enabled: false
    interval: 30s
    namespace: ""
    additionalLabels: {}
    # prometheusServiceAccount is the SA used by Prometheus to scrape metrics.
    # A ClusterRoleBinding is created granting it the metrics-reader role.
    prometheusServiceAccount: prometheus-k8s
    # prometheusNamespace is the namespace where the Prometheus SA lives.
    prometheusNamespace: monitoring

healthProbe:
  port: 8081

# grafanaDashboard provisions the Mirth Operator dashboard as a ConfigMap.
# Grafana's sidecar (e.g. kube-prometheus-stack's grafana chart) auto-imports
# ConfigMaps matching sidecarLabel=sidecarLabelValue in the namespaces it watches.
grafanaDashboard:
  enabled: false
  # Namespace where the ConfigMap is created. Must be one the Grafana sidecar
  # watches. kube-prometheus-stack defaults to searching all namespaces when
  # sidecar.dashboards.searchNamespace=ALL; otherwise set this to the Grafana
  # release namespace (commonly "monitoring").
  namespace: ""
  # Label key/value the Grafana sidecar looks for. Default matches
  # kube-prometheus-stack / grafana chart defaults.
  sidecarLabel: grafana_dashboard
  sidecarLabelValue: "1"
  additionalLabels: {}
  annotations: {}
