apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mirth-operator.fullname" . }}-manager
  labels:
    {{- include "mirth-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - mirth.pyle.io
    resources:
      - mirthinstances
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - mirth.pyle.io
    resources:
      - mirthinstances/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - mirth.pyle.io
    resources:
      - mirthinstances/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  {{- if .Values.metrics.secure }}
  # Required for authn/authz on the secure metrics endpoint
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
