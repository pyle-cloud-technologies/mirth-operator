# This rule is not used by the project mirth-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mirth.pyle.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mirth-operator
    app.kubernetes.io/managed-by: kustomize
  name: mirthinstance-viewer-role
rules:
- apiGroups:
  - mirth.pyle.io
  resources:
  - mirthinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mirth.pyle.io
  resources:
  - mirthinstances/status
  verbs:
  - get
