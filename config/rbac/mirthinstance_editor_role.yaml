# This rule is not used by the project mirth-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mirth.pyle.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mirth-operator
    app.kubernetes.io/managed-by: kustomize
  name: mirthinstance-editor-role
rules:
- apiGroups:
  - mirth.pyle.io
  resources:
  - mirthinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirth.pyle.io
  resources:
  - mirthinstances/status
  verbs:
  - get
